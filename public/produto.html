<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produto - Engordei Perdi</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .product-detail {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--primary-dark);
      text-decoration: none;
      font-weight: 500;
      margin-bottom: 2rem;
      transition: color 0.3s ease;
    }

    .back-link:hover {
      color: var(--primary);
    }

    .product-detail-card {
      background: var(--white);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .detail-image {
      width: 100%;
      min-height: 450px;
      background: var(--secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-size: 5rem;
      overflow: hidden;
    }

    .detail-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .detail-info {
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .detail-category {
      display: inline-block;
      padding: 0.35rem 1rem;
      background: var(--secondary);
      color: var(--primary-dark);
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: capitalize;
      margin-bottom: 1rem;
      align-self: flex-start;
    }

    .detail-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .detail-description {
      color: var(--text-light);
      font-size: 1rem;
      line-height: 1.8;
      margin-bottom: 1.5rem;
    }

    .detail-price {
      font-size: 2.2rem;
      font-weight: 600;
      color: var(--primary-dark);
      margin-bottom: 2rem;
    }

    .detail-price::before {
      content: 'R$ ';
      font-size: 1.3rem;
      font-weight: 400;
    }

    .detail-whatsapp {
      padding: 1.25rem;
      font-size: 1.1rem;
    }

    .loading-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-light);
    }

    .loading-state i {
      font-size: 3rem;
      color: var(--accent);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .error-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-light);
    }

    .error-state i {
      font-size: 4rem;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .error-state h2 {
      font-family: 'Playfair Display', serif;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    @media (max-width: 768px) {
      .product-detail-card {
        grid-template-columns: 1fr;
      }

      .detail-image {
        min-height: 300px;
      }

      .detail-info {
        padding: 2rem;
      }

      .detail-title {
        font-size: 1.5rem;
      }

      .detail-price {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <img src="img/logo.jpeg" alt="Logo Engordei Perdi" class="logo-img">
        <h1>Engordei Perdi</h1>
      </div>
      <p class="tagline">O seu brechó</p>
    </div>
  </header>

  <main class="main">
    <div class="product-detail" id="productDetail">
      <div class="loading-state" id="loadingState">
        <i class="fas fa-spinner"></i>
        <p>Carregando produto...</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-social">
        <a href="https://www.instagram.com/engordei_perdi1209" target="_blank" class="social-link">
          <i class="fab fa-instagram"></i> @engordei_perdi1209
        </a>
        <a href="https://api.whatsapp.com/send?phone=5542988505792" target="_blank" class="social-link">
          <i class="fab fa-whatsapp"></i> WhatsApp
        </a>
      </div>
      <p>&copy; 2024 Engordei Perdi. Feito com <i class="fas fa-heart"></i></p>
    </div>
  </footer>

  <script>
    const API_URL = '/api/products';

    async function loadProduct() {
      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id');
      const container = document.getElementById('productDetail');
      const loading = document.getElementById('loadingState');

      if (!productId) {
        loading.innerHTML = `
          <div class="error-state">
            <i class="fas fa-exclamation-circle"></i>
            <h2>Produto não encontrado</h2>
            <p>Volte para a página principal para ver nossos produtos.</p>
            <a href="/" class="whatsapp-btn" style="margin-top: 1rem; background: var(--primary); display: inline-flex; width: auto;">
              <i class="fas fa-home"></i> Voltar ao início
            </a>
          </div>
        `;
        return;
      }

      try {
        const response = await fetch(`${API_URL}/${productId}`);
        if (!response.ok) throw new Error('Produto não encontrado');
        const product = await response.json();

        document.title = `${product.title} - Brechô da Vivi`;

        const imageHtml = product.image
          ? `<img src="${product.image}" alt="${product.title}">`
          : `<i class="fas fa-tshirt"></i>`;

        const whatsappMsg = encodeURIComponent(
          `Olá! Tenho interesse na peça "${product.title}" que vi no site por R$ ${product.price.toFixed(2)}. Ainda está disponível?`
        );
        const whatsappUrl = `https://api.whatsapp.com/send?phone=${product.whatsapp}&text=${whatsappMsg}`;

        container.innerHTML = `
          <a href="/" class="back-link">
            <i class="fas fa-arrow-left"></i> Voltar aos produtos
          </a>
          <div class="product-detail-card">
            <div class="detail-image">
              ${imageHtml}
            </div>
            <div class="detail-info">
              <span class="detail-category">${product.category}</span>
              <h1 class="detail-title">${product.title}</h1>
              <p class="detail-description">${product.description}</p>
              <div class="detail-price">${product.price.toFixed(2)}</div>
              <a href="${whatsappUrl}" target="_blank" class="whatsapp-btn detail-whatsapp">
                <i class="fab fa-whatsapp"></i>
                Falar com a Dona no WhatsApp
              </a>
            </div>
          </div>
        `;
      } catch (error) {
        loading.innerHTML = `
          <div class="error-state">
            <i class="fas fa-exclamation-circle"></i>
            <h2>Produto não encontrado</h2>
            <p>Este produto pode ter sido removido ou não existe.</p>
            <a href="/" class="whatsapp-btn" style="margin-top: 1rem; background: var(--primary); display: inline-flex; width: auto;">
              <i class="fas fa-home"></i> Voltar ao início
            </a>
          </div>
        `;
      }
    }

    loadProduct();
  </script>
</body>
</html>
